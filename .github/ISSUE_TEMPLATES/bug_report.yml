name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: PhantomCurl Version
      description: What version of our software are you running?
      placeholder: ex. 0.1.0
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Code to Reproduce
      description: Please provide a minimal, reproducible example.
      render: python
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: What did you see? Include stack traces if available.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g., target website URL, OS, Python version).